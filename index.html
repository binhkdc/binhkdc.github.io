<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-xl rounded-2xl">
    <h2 class="text-xl font-bold text-indigo-600 mb-4 border-b pb-2">Danh sách sản phẩm</h2>
    <div id="app" class="space-y-3">
        <div class="animate-pulse flex space-x-4">
            <div class="flex-1 space-y-4 py-1">
                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                <div class="h-4 bg-gray-200 rounded"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://your-project.supabase.co/rest/v1/products';
    const API_KEY = 'YOUR_ANON_KEY';

    async function loadData() {
        try {
            const response = await fetch(API_URL, {
                headers: {
                    'apikey': API_KEY,
                    'Authorization': `Bearer ${API_KEY}`
                }
            });
            const data = await response.json();
            
            const container = document.getElementById('app');
            container.innerHTML = ''; // Xóa trạng thái loading

            data.forEach(item => {
                const card = `
                    <div class="p-3 bg-indigo-50 rounded-lg border border-indigo-100 hover:scale-105 transition-transform">
                        <p class="font-medium text-indigo-900">${item.name}</p>
                        <p class="text-sm text-indigo-500">$${item.price}</p>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (error) {
            console.error('Lỗi API:', error);
        }
    }

    loadData();
</script>
