<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI/UX Skills - Binh KDC</title>
    <!-- Tận dụng Bootstrap 5 có sẵn trong project của bạn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .skill-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .skill-title {
            color: #d63384; /* Màu hồng tone-sur-tone với web của bạn */
            font-weight: bold;
        }
        .progress-bar {
            background-color: #d63384;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 skill-section">
                <h2 class="text-center skill-title mb-4">🎨 Kỹ Năng UI/UX</h2>
                
                <!-- Kỹ năng 1: Figma / Design Tools -->
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <span>Figma / Adobe XD</span>
                        <span>90%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 90%;" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <!-- Kỹ năng 2: User Research -->
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <span>User Research & Persona</span>
                        <span>80%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 80%;" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <!-- Kỹ năng 3: Wireframing & Prototyping -->
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <span>Wireframing & Prototyping</span>
                        <span>85%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 85%;" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <!-- Kỹ năng 4: HTML/CSS (Front-end) -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <span>HTML/CSS & Bootstrap (Dành cho UI)</span>
                        <span>75%</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar" style="width: 75%;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="/index.html" class="btn btn-outline-secondary">Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Tận dụng jQuery có sẵn trong project của bạn -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script>
        // Hiệu ứng animation nhỏ cho thanh progress khi load trang
        $(document).ready(function() {
            $('.progress-bar').each(function() {
                var width = $(this).css('width');
                $(this).css('width', '0%');
                $(this).animate({ width: width }, 1500); // 1.5s animation
            });
        });
    </script>
</body>
</html>
